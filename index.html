<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Qurix Quiz Pro</title>
<style>
*{box-sizing:border-box;font-family:Arial;}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;}
body{display:flex;justify-content:center;align-items:center;background:linear-gradient(120deg,#020617,#0f172a);color:white;position:fixed;top:0;left:0;}
body::before{content:"";position:absolute;width:200%;height:200%;background-image:radial-gradient(circle,#ffffff33 1px,transparent 1px);background-size:60px 60px;animation:particles 30s linear infinite;z-index:-1;}
@keyframes particles{0%{transform:translateY(0)}100%{transform:translateY(-200px)}}
.card{max-width:500px;width:95%;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:30px;border-radius:20px;backdrop-filter:blur(15px);background:rgba(255,255,255,0.08);box-shadow:0 10px 40px rgba(0,0,0,0.6);text-align:center;position:relative;}
input{width:100%;padding:12px;margin-top:6px;border:none;border-radius:8px;font-size:16px;overflow-x:auto;white-space:nowrap;text-overflow:ellipsis;}
input:focus{outline:2px solid #22c55e;}
#login button, #home button{background:#22c55e;color:white;width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;font-size:16px;cursor:pointer;transition:0.2s;}
#login button:hover,#home button:hover{transform:translateY(-2px);}
.option{width:100%;padding:14px;margin:6px 0;border-radius:12px;text-align:center;cursor:pointer;transition:0.2s;background:rgba(255,255,255,0.1);}
.option:hover{background:rgba(255,255,255,0.2);}
.option.correct{background:#22c55e;color:white;}
#timer{font-size:24px;width:100%;text-align:center;margin-bottom:10px;color:#ffff00;text-shadow:0 0 10px #ffff00,0 0 20px #ffff00;}
#totaltimer{font-size:16px;width:100%;text-align:center;margin-bottom:5px;color:#facc15;}
#category{font-size:18px;color:#22c55e;margin-bottom:5px;}
.progress{width:100%;height:8px;background:#334155;border-radius:10px;overflow:hidden;margin-top:10px;}
.progress-bar{height:8px;width:0%;background:#22c55e;transition:0.4s;}
.nav-btns{display:flex;justify-content:space-between;margin-top:10px;width:100%;}
.nav-btns button{width:48%;}
.hidden{display:none;}
.level-btn{width:48%;padding:12px;border-radius:10px;margin:5px;cursor:pointer;background:white;color:black;transition:0.2s;}
.level-btn.locked{background:#555;color:white;cursor:not-allowed;}
.level-btn:hover:not(.locked){transform:translateY(-2px);}
.disclaimer{font-size:14px;color:#fbbf24;margin:10px 0;text-align:center;}
</style>
</head>
<body>

<div id="login" class="card">
<h2>Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button id="togglePassBtn" onclick="togglePassword()">Show Password</button>
<button id="loginBtn" onclick="login()">Login</button>
</div>

<div id="home" class="card hidden">
<h2>Welcome to Qurix</h2>
<p>Select difficulty level to start quiz</p>
<div id="levels">
<button class="level-btn" id="easyBtn" onclick="startLevel('easy')">Easy</button>
<button class="level-btn locked" id="mediumBtn" onclick="startLevel('medium')">Medium </button>
<button class="level-btn locked" id="hardBtn" onclick="startLevel('hard')">Hard </button>
</div>
</div>

<div id="quiz" class="card hidden">
<div id="totaltimer">Total Time: 50:00</div>
<h3 id="qnumber"></h3>
<div id="category"></div>
<div id="timer">60</div>
<div class="progress"><div id="progressBar" class="progress-bar"></div></div>
<h2 id="question"></h2>
<div id="options" style="flex-grow:1;overflow-y:auto;width:100%;"></div>
<div class="nav-btns">
<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
</div>
</div>

<div id="result" class="card hidden">
<h2>Quiz Finished</h2>
<h3 id="score"></h3>
<button onclick="restartQuiz()">Restart</button>
</div>

window.onload=function(){
  let savedU=localStorage.getItem("savedUser");
  let savedP=localStorage.getItem("savedPass");
  if(savedU && savedP){

    document.getElementById("password").value=savedP;
  }
}

let passwordVisible=false;
function togglePassword(){
  let p=document.getElementById("password");
  passwordVisible=!passwordVisible;
  p.type=passwordVisible?"text":"password";
  document.getElementById("togglePassBtn").innerText=passwordVisible?"Hide Password":"Show Password";
}

function login(){
  let u=document.getElementById("username").value.trim();
  let p=document.getElementById("password").value.trim();
  if(u!=="" && p!==""){
    localStorage.setItem("savedUser",u);
    localStorage.setItem("savedPass",p);
    document.getElementById("login").classList.add("hidden");
    document.getElementById("home").classList.remove("hidden");
  }else alert("Enter username and password");
}

// Rest of quiz JS same as previous code
function startLevel(level){
  if(level==='medium' && !localStorage.getItem('easyComplete')) return alert("Finish Easy level first!");
  if(level==='hard' && !localStorage.getItem('mediumComplete')) return alert("Finish Medium level first!");
  currentLevel=level; current=0; answers=[];
  document.getElementById('home').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  totalTime=50*60;
  startTotalTimer();
  loadQuestion();
}

function shuffleArray(arr){for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function loadQuestion(){
  let q=questionsData[currentLevel][current];
  document.getElementById("qnumber").innerText="Question "+(current+1)+" / "+questionsData[currentLevel].length;
  document.getElementById("category").innerText=q.cat;
  document.getElementById("question").innerText=q.q;
  let opts=q.o.map((opt,i)=>({text:opt,idx:i}));
  shuffleArray(opts);
  let correctIdx=opts.findIndex(o=>o.idx===q.a);
  q.correctShuffled=correctIdx;
  let optionsHTML="";
  opts.forEach((o,i)=>{
    let sel=answers[current]===i?"correct":"";
    optionsHTML+=`<div class="option ${sel}" onclick="selectAnswer(${i},this)">${o.text}</div>`;
  });
  document.getElementById("options").innerHTML=optionsHTML;
  document.getElementById("progressBar").style.width=((current)/questionsData[currentLevel].length*100)+"%";
  startQuestionTimer();
}

function selectAnswer(i,elem){answers[current]=i; document.querySelectorAll(".option").forEach(opt=>opt.classList.remove("correct")); elem.classList.add("correct");}
function nextQuestion(){if(current<questionsData[currentLevel].length-1){current++;loadQuestion();}else finishQuiz();}
function prevQuestion(){if(current>0){current--;loadQuestion();}}
function startQuestionTimer(){clearInterval(timerVar);timeLeft=60;const timerElem=document.getElementById("timer");timerElem.innerText=timeLeft;timerVar=setInterval(()=>{timeLeft--;timerElem.innerText=timeLeft;if(timeLeft<=0) nextQuestion();},1000);}
function startTotalTimer(){clearInterval(totalTimerVar);totalTimerVar=setInterval(()=>{totalTime--;let min=Math.floor(totalTime/60);let sec=totalTime%60;document.getElementById("totaltimer").innerText="Total Time: "+String(min).padStart(2,'0')+":"+String(sec).padStart(2,'0');if(totalTime<=0) finishQuiz();},1000);}
function finishQuiz(){clearInterval(timerVar); clearInterval(totalTimerVar);document.getElementById("quiz").classList.add("hidden");document.getElementById("result").classList.remove("hidden");let score=0;for(let i=0;i<questionsData[currentLevel].length;i++){if(answers[i]===questionsData[currentLevel][i].correctShuffled) score++;}document.getElementById("score").innerText="Correct: "+score+" / "+questionsData[currentLevel].length;if(currentLevel==='easy'){localStorage.setItem('easyComplete','1');document.getElementById('mediumBtn').classList.remove('locked');}if(currentLevel==='medium'){localStorage.setItem('mediumComplete','1');document.getElementById('hardBtn').classList.remove('locked');}}
function restartQuiz(){current=0; answers=[]; totalTime=50*60; document.getElementById("result").classList.add("hidden"); document.getElementById("home").classList.remove("hidden");}
</script>
</body>
</html>
